<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vorila</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
      background: #ffffff;
      color: #000000;
      line-height: 1.5;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px;
    }

    header {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 80px;
    }

    h1 {
      font-size: 42px;
      font-weight: 700;
      margin: 0 0 16px 0;
      letter-spacing: -0.5px;
    }

    .sub {
      font-size: 18px;
      color: #666666;
      margin-bottom: 64px;
      max-width: 520px;
    }

    .apps {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .app-card {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .app-title {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 6px 0;
    }

    .app-text {
      font-size: 15px;
      color: #666666;
      margin: 0 0 10px 0;
    }

    .app-link {
      font-size: 15px;
      color: #007aff;
      text-decoration: none;
      font-weight: 500;
    }

    footer {
      margin-top: 80px;
      font-size: 14px;
      color: #888888;
    }

    footer a {
      margin-right: 16px;
      color: inherit;
      text-decoration: none;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #000000;
        color: #ffffff;
      }

      .sub,
      .app-text,
      footer {
        color: #888888;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <header>Vorila</header>

    <h1>
      Small tools.<br>
      For moments that matter.
    </h1>

    <p class="sub">
      Prepare your state before performance.
      Capture what matters afterwards.
    </p>

    <div class="apps">

      <!-- VorilaPrep -->
      <div class="app-card">
        <img src="https://sebastian-kerski.github.io/vorila/vorila-prep.png" alt="VorilaPrep" class="app-icon">
        <div>
          <p class="app-title">VorilaPrep</p>
          <p class="app-text">Prepare your state before performance.</p>
          <a class="app-link" href="https://apps.apple.com/de/app/vorila-prep/id6760753050">
            View on App Store →
          </a>
        </div>
      </div>

      <!-- VorilaLog -->
      <div class="app-card">
        <img src="https://sebastian-kerski.github.io/vorila/vorila-log.png" alt="VorilaLog" class="app-icon">
        <div>
          <p class="app-title">VorilaLog</p>
          <p class="app-text">Capture activity when tracking isn’t possible.</p>
          <a class="app-link" href="https://apps.apple.com/de/app/vorilalog/id6758885506">
            View on App Store →
          </a>
        </div>
      </div>

    </div>

    <footer>
      <a href="https://sebastian-kerski.github.io/vorila/support.html">Support</a>
      <a href="https://sebastian-kerski.github.io/vorila/privacy.html">Privacy</a>
    </footer>

  </div>
</body>
</html>
